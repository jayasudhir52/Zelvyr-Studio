<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Zelvyr Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>

    <div class="glass-panel" id="admin-login-panel">
        <h1>Admin Access</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px;">Authorized Personnel Only</p>
        
        <form id="admin-login-form">
            <div class="form-group">
                <input type="text" id="adminUsername" required placeholder="Username">
            </div>
            <div class="form-group">
                <input type="password" id="adminPassword" required placeholder="Password">
            </div>
            <button type="submit">Login</button>
        </form>
    </div>

    <div class="glass-panel hidden admin-panel wide" id="admin-dashboard-panel">
        <div class="dashboard-header">
            <h2>Project Management</h2>
            <button id="logout-btn" style="width: auto; padding: 10px 20px; margin: 0; background: rgba(255,0,0,0.2);">Logout</button>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Project ID</th>
                        <th>Student Name</th>
                        <th>Project Title</th>
                        <th>Status</th>
                        <th>Progress (%)</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="projects-table-body">
                    <!-- Data populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS.load('particles-js', 'https://raw.githubusercontent.com/VincentGarreau/particles.js/master/particles.json');
    </script>
    <script type="module" src="admin.js"></script>
</body>
</html>
