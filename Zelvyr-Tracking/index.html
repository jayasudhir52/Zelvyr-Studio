<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelvyr Studio Project Works - Submission Portal</title>
    <link rel="stylesheet" href="style.css">
    <!-- EmailJS integration -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Replace with your EmailJS public key
            emailjs.init("nbXFkQ4b8wcT0RxCb"); 
        })();
    </script>
</head>
<body>
    <div id="particles-js"></div>

    <div class="glass-panel" id="main-panel">
        <div id="form-container">
            <h1>Start Your Project</h1>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px;">Zelvyr Studio Project Works</p>
            
            <form id="submission-form">
                <div class="form-group">
                    <label for="studentName">Full Name</label>
                    <input type="text" id="studentName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="studentEmail">Email Address</label>
                    <input type="email" id="studentEmail" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="projectTitle">Project Title</label>
                    <input type="text" id="projectTitle" required placeholder="E-commerce Web App">
                </div>
                <div class="form-group">
                    <label for="projectDetails">Project Details</label>
                    <textarea id="projectDetails" rows="4" required placeholder="Describe your requirements..."></textarea>
                </div>
                <button type="submit" id="submit-btn">Submit Request</button>
            </form>
            <div style="text-align: center; margin-top: 20px;">
                <a href="track.html" style="color: var(--primary-color); text-decoration: none;">Track Existing Project</a>
            </div>
        </div>

        <div id="success-container" class="success-screen hidden">
            <h2>Success! 🎉</h2>
            <p>Your project request has been submitted successfully.</p>
            <p>Please save your unique Project ID to track your progress:</p>
            <div class="project-id-display" id="generated-id">ZEL-2026-XXXXXX</div>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">An email confirmation has been sent to you.</p>
            <a href="track.html"><button>Track Project Now</button></a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS.load('particles-js', 'https://raw.githubusercontent.com/VincentGarreau/particles.js/master/particles.json', function() {
            console.log('particles.js loaded');
        });
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
