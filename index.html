<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelvyr Studio - Temporarily Closed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            padding: 20px;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            color: white;
        }
        
        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .divider {
            width: 60px;
            height: 3px;
            background: rgba(255, 255, 255, 0.5);
            margin: 20px auto;
            border-radius: 2px;
        }
        
        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        
        .contact-box {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .contact-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .contact-name {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .contact-phone {
            font-size: 20px;
            font-weight: 500;
        }
        
        .contact-phone a {
            color: white;
            text-decoration: none;
            transition: opacity 0.3s;
        }
        
        .contact-phone a:hover {
            opacity: 0.7;
        }
        
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        
        @media (max-width: 480px) {
            .glass-card {
                padding: 35px 25px;
            }
            h1 {
                font-size: 24px;
            }
            .logo {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="icon">⏸️</div>
        <div class="logo">ZELVYR STUDIO</div>
        <div> class="logo">Temporarily Closed</div>
        <div class="divider"></div>
